Name: gateway-example # gateway name
Host: localhost # gateway host
Port: 8888 # gateway port
timeout: 60000000
MaxBytes: 3145728

Middlewares:
  Metrics: true
  Trace: true
  Breaker: false
  Prometheus: true

Gateway:
  DisableReflection: true

Log:
  ServiceName: gateway
  Encoding: plain
  Level: debug

RequestLimit:
  - Path: /ping
    QPS: 1000
  - Path: /api/liquidity/cpmm/tokens
    QPS: 60
  - Path: /api/liquidity/cpmm/fee-tiers
    QPS: 60
  - Path: /api/liquidity/cpmm/pools
    QPS: 20

IpRestriction:
  IsoCode: # example CN,US,HK,SG,JP
    - SG

Auth:
  Prefix: /v1/account
  JwtSecret:
  TgToken:

Redis:
  Host: 127.0.0.1
  Port: 6379
  # Auth: 123456
  MaxIdle: 20
  MaxActive: 100
  Db: 0
  Tls: false
  Type: "standalone"
  PingTimeout: 1s

Websocket:
  Host: http://127.0.0.1:13888
  Path: /ws

Upstreams: # upstreams
  - Grpc: # grpc upstream
      Target: 127.0.0.1:8090 # grpc target,the direct grpc server address,for only one node
      nonblock: true
      timeout: 100000
    ProtoSets:
      - internal/embed/pb/market.pb
    # Mappings can also be written in proto options
    Mappings: # routes mapping
      - Method: get
        Path: /v1/market/index_pump
        RpcPath: market.Market/GetPumpTokenList
      - Method: get
        Path: /v1/market/index_clmm
        RpcPath: market.Market/GetClmmPoolList
      - Method: get
        Path: /v1/market/index_cpmm
        RpcPath: market.Market/GetClmmPoolList
  - Name: trade
    Grpc: # trade service upstream
      Target: localhost:8100 # grpc target,the direct grpc server address,for only one node
      nonblock: true
      timeout: 60000000
    ProtoSets:
      - internal/embed/pb/trade.pb
    Mappings:
      - Method: post
        Path: /v1/trade/create_market_order
        RpcPath: trade.Trade/CreateMarketOrder
      - Method: post
        Path: /v1/pump/create_token
        RpcPath: trade.Trade/CreatePumpToken
      - Method: post
        Path: /v1/ipfs/upload_file
        RpcPath: trade.Trade/UploadIpfsFile
      - Method: post
        Path: /v1/ipfs/upload_metadata
        RpcPath: trade.Trade/UploadTokenMetadata
      - Method: post
        Path: /v1/pump/report_create_result
        RpcPath: trade.Trade/ReportPumpCreateResult
      - Method: post
        Path: /v1/pump/quote
        RpcPath: trade.Trade/QuotePumpTrade
whitelist:
  path:
    - /v1/market/index_pump
    - /v1/market/index_clmm
    - /v1/market/index_cpmm
    - /v1/trade/create_market_order
    - /v1/pump/create_token
    - /v1/ipfs/upload_file
    - /v1/ipfs/upload_metadata
    - /v1/pump/report_create_result
    - /v1/pump/quote
Liquidity:
  CacheTTLSeconds: 60
  Paths:
    Tokens: /api/liquidity/cpmm/tokens
    FeeTiers: /api/liquidity/cpmm/fee-tiers
    CreatePool: /api/liquidity/cpmm/pools
  RateLimit:
    TokensQPS: 60
    FeeTiersQPS: 60
    CreatePoolQPS: 20